    <title>Modern Nav & Logo Scroll with Glass Toggle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-bg': '#0f0f0f',
                    }
                }

    <style>
        body {
            /* Smooth background transition for theme switching */
            transition: background-color 0.5s ease, color 0.5s ease;
            font-family: sans-serif;
        }

        /* --- 1. Page Load Animation --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-up {
            animation: fadeUp 0.8s ease-out forwards;
        }

        /* --- Logo Scroll Logic --- */
        .logo-scroll {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            padding: 2rem 0;
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        .logo-track {
            display: inline-flex;
            align-items: center;
            animation: scroll 40s linear infinite; 
            width: max-content;
        }

        .logo-scroll:hover .logo-track {
            animation-play-state: paused;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Logo Hover Animation */
        .logo-link {
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin: 0 40px; 
            border-radius: 8px;
        }

        .logo-link:hover {
            transform: scale(1.1) translateY(-4px); 
            filter: drop-shadow(0 10px 15px rgba(128, 128, 128, 0.2)); 
        }

        .logo-img {
            object-fit: contain; 
            display: block;
        }

        /* --- Nav Dropdown Animation --- */
        div[id^="header-nav-"] {
            visibility: hidden;
            opacity: 0;
            transform: translate(-50%, 10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .relative:hover > div[id^="header-nav-"] {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, 0);
            pointer-events: auto;
        }

        /* Adaptive Glassmorphism for Dropdowns */
        .nav-glass {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }

        /* --- GLASS THEME TOGGLE CSS --- */
        .glass-toggle-bubble {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Light mode bubble styling */
        html:not(.dark) .glass-toggle-bubble {
            background-color: rgba(255, 255, 255, 0.4);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.8), 
                inset 0 -1px 2px rgba(0, 0, 0, 0.05), 
                0 4px 12px rgba(0, 0, 0, 0.15);
        }

        /* Dark mode bubble styling */
        html.dark .glass-toggle-bubble {
            background-color: rgba(255, 255, 255, 0.05);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.15), 
                inset 0 -1px 2px rgba(0, 0, 0, 0.3), 
                0 4px 12px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

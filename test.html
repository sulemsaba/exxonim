<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS MacBook Video</title>
    <style>
        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* The overall container */
        .macbook-container {
            width: 100%;
            max-width: 800px; /* Change this to resize the whole laptop */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Top Lid (Screen Bezel) */
        .macbook-lid {
            width: 80%;
            background-color: #1a1a1a; /* Black bezels */
            border-radius: 20px 20px 0 0;
            padding: 3% 3% 4% 3%;
            position: relative;
            box-shadow: inset 0 0 0 2px #333, 0px -2px 10px rgba(0,0,0,0.2);
        }

        /* The webcam dot */
        .macbook-lid::before {
            content: '';
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background-color: #444;
            border-radius: 50%;
        }

        /* The actual screen where the video plays */
        .macbook-screen {
            width: 100%;
            aspect-ratio: 16 / 10; /* Standard MacBook screen ratio */
            background-color: #000;
            border-radius: 4px;
            overflow: hidden;
        }

        .macbook-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* The Bottom Base (Keyboard deck edge) */
        .macbook-base {
            width: 100%;
            height: 20px;
            background: linear-gradient(to bottom, #d6d9df 0%, #b8babc 100%);
            border-radius: 0 0 20px 20px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* The thumb groove to open the laptop */
        .macbook-base::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 15%;
            height: 6px;
            background-color: #999;
            border-radius: 0 0 6px 6px;
        }

        /* The small grey bottom lip */
        .macbook-bottom-lip {
            width: 98%;
            height: 4px;
            background-color: #888;
            border-radius: 0 0 20px 20px;
        }
    </style>
</head>
<body>

    <div class="macbook-container">
        <div class="macbook-lid">
            <div class="macbook-screen">
                <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted playsinline></video>
            </div>
        </div>
        
        <div class="macbook-base"></div>
        <div class="macbook-bottom-lip"></div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacBook Video Mockup</title>
    <style>
        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* The container that holds both the laptop and the video */
        .macbook-mockup {
            position: relative;
            width: 100%;
            max-width: 900px; /* Adjust this to make the laptop bigger/smaller */
            margin: 0 auto;
        }

        /* The transparent MacBook Image */
        .macbook-frame {
            width: 100%;
            display: block;
            position: relative;
            z-index: 10; /* Keeps the laptop frame ON TOP of the video */
            pointer-events: none; /* Lets users click the video if you add controls */
        }

        /* The screen area where the video lives */
        .macbook-screen {
            position: absolute;
            z-index: 1; /* Puts the video BEHIND the laptop frame */
            background-color: #000; /* Black background while video loads */
            overflow: hidden;
            
            /* IMPORTANT: These percentages might need slight tweaking 
               depending on the exact transparent image you download, 
               but these are standard for a straight-on MacBook Pro. */
            top: 11%;
            left: 11.8%;
            width: 76.4%;
            height: 74%;
            border-radius: 1%; /* Slight curve for the screen corners */
        }

        /* Make the video fill the screen area perfectly */
        .macbook-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video doesn't stretch or distort */
        }
    </style>
</head>
<body>

    <div class="macbook-mockup">
        <div class="macbook-screen">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted playsinline></video>
        </div>

        <img class="macbook-frame" src="https://www.freepnglogos.com/uploads/macbook-png/macbook-transparent-png-pictures-icons-and-png-1.png" alt="MacBook Frame">
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exxonim | Business Consulting for Growth and Performance</title>
    <meta
      name="description"
      content="Exxonim is a business consulting website for leadership teams improving strategy, operating performance, and transformation delivery."
    />
    <script>
      (() => {
        try {
          const savedTheme =
            localStorage.getItem("exxonim-theme") ??
            localStorage.getItem("koro-theme");
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          document.documentElement.dataset.theme =
            savedTheme === "dark" || (savedTheme !== "light" && prefersDark)
              ? "dark"
              : "light";
        } catch (error) {
          document.documentElement.dataset.theme = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches
            ? "dark"
            : "light";
        }
      })();
    </script>
    <link
      rel="preload"
      as="image"
      href="/exxonim-logo.webp"
      fetchpriority="high"
      type="image/webp"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exxonim | Registration, Licensing, and Compliance Support</title>
    <meta
      name="description"
      data-exxonim="description"
      content="Exxonim helps businesses, NGOs, and institutions handle registration, licensing, statutory filing, and practical compliance work in Tanzania."
    />
    <meta name="robots" data-exxonim="robots" content="index,follow" />
    <link rel="canonical" data-exxonim="canonical" href="https://exxonim.tz/" />
    <meta property="og:type" data-exxonim="og:type" content="website" />
    <meta
      property="og:title"
      data-exxonim="og:title"
      content="Exxonim | Registration, Licensing, and Compliance Support"
    />
    <meta
      property="og:description"
      data-exxonim="og:description"
      content="Exxonim helps businesses, NGOs, and institutions handle registration, licensing, statutory filing, and practical compliance work in Tanzania."
    />
    <meta property="og:url" data-exxonim="og:url" content="https://exxonim.tz/" />
    <meta
      property="og:image"
      data-exxonim="og:image"
      content="https://exxonim.tz/exxonim-logo.webp"
    />
    <meta
      name="twitter:card"
      data-exxonim="twitter:card"
      content="summary_large_image"
    />
    <meta
      name="twitter:title"
      data-exxonim="twitter:title"
      content="Exxonim | Registration, Licensing, and Compliance Support"
    />
    <meta
      name="twitter:description"
      data-exxonim="twitter:description"
      content="Exxonim helps businesses, NGOs, and institutions handle registration, licensing, statutory filing, and practical compliance work in Tanzania."
    />
    <meta
      name="twitter:image"
      data-exxonim="twitter:image"
      content="https://exxonim.tz/exxonim-logo.webp"
    />
    <script>
      (() => {
        try {
          const savedTheme =
            localStorage.getItem("exxonim-theme") ??
            localStorage.getItem("koro-theme");
          document.documentElement.dataset.theme =
            savedTheme === "light" ? "light" : "dark";
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link
      rel="preload"
      as="image"
      href="/exxonim-logo.webp"
      fetchpriority="high"
      type="image/webp"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exxonim - Innovation Meets Efficiency</title>
    <meta
      name="description"
      content="Exxonim helps businesses, NGOs, and institutions with registration, licensing, statutory filing, and practical compliance support in Tanzania."
    />
    <script>
      (() => {
        try {
          const savedTheme =
            localStorage.getItem("exxonim-theme") ??
            localStorage.getItem("koro-theme");
          document.documentElement.dataset.theme =
            savedTheme === "light" ? "light" : "dark";
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link
      rel="preload"
      as="image"
      href="/exxonim-logo.webp"
      fetchpriority="high"
      type="image/webp"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
